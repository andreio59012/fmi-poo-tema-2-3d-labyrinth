name: Renovate OS
on:
  workflow_dispatch: {}

jobs:
  Renovate:
    # renovate: depName=ubuntu
    runs-on: ubuntu-22.04
    if: ${{ github.repository == 'andreio59012/fmi-poo-tema-2-3d-labyrinth' }}
    steps:
      - name: Checkout
        # renovate: datasource=github-tags depName=actions/checkout versioning=loose
        uses: actions/checkout@v6.0.2

      - name: Run Renovate
        # renovate: datasource=github-tags depName=renovatebot/github-action versioning=loose
        uses: renovatebot/github-action@v46.1.1
        env:
          LOG_LEVEL: debug
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_ONBOARDING: "false"
          RENOVATE_REQUIRE_CONFIG: "optional"
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
          configurationFile: .github/config/renovate-os.json
